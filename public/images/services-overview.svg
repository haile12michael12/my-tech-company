<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="serviceGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="serviceGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="serviceGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>
  
  <!-- Card 1: Web Development -->
  <g transform="translate(50, 50)">
    <rect width="220" height="160" rx="12" fill="url(#serviceGrad1)" opacity="0.1"/>
    <rect x="10" y="10" width="200" height="140" rx="8" fill="none" stroke="url(#serviceGrad1)" stroke-width="2"/>
    <circle cx="110" cy="60" r="30" fill="url(#serviceGrad1)" opacity="0.2"/>
    <path d="M80 60 L100 80 L140 40" stroke="url(#serviceGrad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="100" width="140" height="8" rx="4" fill="url(#serviceGrad1)" opacity="0.3"/>
    <rect x="40" y="120" width="100" height="6" rx="3" fill="url(#serviceGrad1)" opacity="0.2"/>
  </g>
  
  <!-- Card 2: Mobile Apps -->
  <g transform="translate(290, 50)">
    <rect width="220" height="160" rx="12" fill="url(#serviceGrad2)" opacity="0.1"/>
    <rect x="10" y="10" width="200" height="140" rx="8" fill="none" stroke="url(#serviceGrad2)" stroke-width="2"/>
    <rect x="85" cy="60" width="50" height="70" rx="8" fill="url(#serviceGrad2)" opacity="0.2"/>
    <circle cx="110" cy="115" r="8" fill="none" stroke="url(#serviceGrad2)" stroke-width="2"/>
    <rect x="40" y="100" width="140" height="8" rx="4" fill="url(#serviceGrad2)" opacity="0.3"/>
    <rect x="40" y="120" width="100" height="6" rx="3" fill="url(#serviceGrad2)" opacity="0.2"/>
  </g>
  
  <!-- Card 3: Cloud Solutions -->
  <g transform="translate(530, 50)">
    <rect width="220" height="160" rx="12" fill="url(#serviceGrad3)" opacity="0.1"/>
    <rect x="10" y="10" width="200" height="140" rx="8" fill="none" stroke="url(#serviceGrad3)" stroke-width="2"/>
    <path d="M90 50 Q110 30 130 50 Q150 70 130 90 Q110 110 90 90 Q70 70 90 50" fill="url(#serviceGrad3)" opacity="0.2"/>
    <rect x="40" y="100" width="140" height="8" rx="4" fill="url(#serviceGrad3)" opacity="0.3"/>
    <rect x="40" y="120" width="100" height="6" rx="3" fill="url(#serviceGrad3)" opacity="0.2"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="750" cy="550" r="30" fill="url(#serviceGrad1)" opacity="0.1"/>
  <circle cx="50" cy="550" r="20" fill="url(#serviceGrad2)" opacity="0.1"/>
  <circle cx="400" cy="300" r="15" fill="url(#serviceGrad3)" opacity="0.1"/>
</svg>
