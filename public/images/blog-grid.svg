<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="blogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#FFFFFF"/>
  
  <!-- Abstract Background Pattern -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="80" fill="url(#blogGrad)"/>
    <circle cx="1100" cy="100" r="100" fill="url(#blogGrad)"/>
    <circle cx="100" cy="700" r="120" fill="url(#blogGrad)"/>
    <circle cx="1100" cy="700" r="90" fill="url(#blogGrad)"/>
  </g>
  
  <!-- Blog Post Card 1 -->
  <g transform="translate(100, 150)">
    <rect width="300" height="200" rx="12" fill="#F1F5F9"/>
    <rect x="20" y="20" width="260" height="120" rx="8" fill="url(#blogGrad)" opacity="0.2"/>
    <rect x="40" y="160" width="200" height="12" rx="6" fill="#94A3B8"/>
    <rect x="40" y="180" width="140" height="8" rx="4" fill="#CBD5E1"/>
  </g>
  
  <!-- Blog Post Card 2 -->
  <g transform="translate(450, 150)">
    <rect width="300" height="200" rx="12" fill="#F1F5F9"/>
    <rect x="20" y="20" width="260" height="120" rx="8" fill="url(#blogGrad)" opacity="0.3"/>
    <circle cx="150" cy="80" r="40" fill="url(#blogGrad)" opacity="0.2"/>
    <rect x="40" y="160" width="200" height="12" rx="6" fill="#94A3B8"/>
    <rect x="40" y="180" width="140" height="8" rx="4" fill="#CBD5E1"/>
  </g>
  
  <!-- Blog Post Card 3 -->
  <g transform="translate(800, 150)">
    <rect width="300" height="200" rx="12" fill="#F1F5F9"/>
    <rect x="20" y="20" width="260" height="120" rx="8" fill="url(#blogGrad)" opacity="0.25"/>
    <path d="M150 40 L180 100 L120 100 Z" fill="url(#blogGrad)" opacity="0.3"/>
    <rect x="40" y="160" width="200" height="12" rx="6" fill="#94A3B8"/>
    <rect x="40" y="180" width="140" height="8" rx="4" fill="#CBD5E1"/>
  </g>
  
  <!-- Blog Post Card 4 -->
  <g transform="translate(100, 400)">
    <rect width="300" height="200" rx="12" fill="#F1F5F9"/>
    <rect x="20" y="20" width="260" height="120" rx="8" fill="url(#blogGrad)" opacity="0.3"/>
    <rect x="60" y="50" width="180" height="60" rx="8" fill="url(#blogGrad)" opacity="0.2"/>
    <rect x="40" y="160" width="200" height="12" rx="6" fill="#94A3B8"/>
    <rect x="40" y="180" width="140" height="8" rx="4" fill="#CBD5E1"/>
  </g>
  
  <!-- Blog Post Card 5 -->
  <g transform="translate(450, 400)">
    <rect width="300" height="200" rx="12" fill="#F1F5F9"/>
    <rect x="20" y="20" width="260" height="120" rx="8" fill="url(#blogGrad)" opacity="0.2"/>
    <line x1="60" y1="50" x2="240" y2="50" stroke="url(#blogGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="80" x2="240" y2="80" stroke="url(#blogGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="60" y1="110" x2="180" y2="110" stroke="url(#blogGrad)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <rect x="40" y="160" width="200" height="12" rx="6" fill="#94A3B8"/>
    <rect x="40" y="180" width="140" height="8" rx="4" fill="#CBD5E1"/>
  </g>
  
  <!-- Blog Post Card 6 -->
  <g transform="translate(800, 400)">
    <rect width="300" height="200" rx="12" fill="#F1F5F9"/>
    <rect x="20" y="20" width="260" height="120" rx="8" fill="url(#blogGrad)" opacity="0.25"/>
    <polygon points="150,50 170,90 130,90" fill="url(#blogGrad)" opacity="0.3"/>
    <rect x="40" y="160" width="200" height="12" rx="6" fill="#94A3B8"/>
    <rect x="40" y="180" width="140" height="8" rx="4" fill="#CBD5E1"/>
  </g>
  
  <!-- Central Reading Icon -->
  <g transform="translate(600, 650)">
    <circle r="60" fill="url(#blogGrad)" opacity="0.15"/>
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="none" stroke="url(#blogGrad)" stroke-width="3"/>
    <line x1="-10" y1="-20" x2="-10" y2="20" stroke="url(#blogGrad)" stroke-width="3"/>
    <line x1="10" y1="-20" x2="10" y2="20" stroke="url(#blogGrad)" stroke-width="3"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="200" cy="50" r="10" fill="url(#blogGrad)" opacity="0.4"/>
  <circle cx="1000" cy="50" r="15" fill="url(#blogGrad)" opacity="0.4"/>
  <circle cx="200" cy="750" r="12" fill="url(#blogGrad)" opacity="0.4"/>
  <circle cx="1000" cy="750" r="10" fill="url(#blogGrad)" opacity="0.4"/>
</svg>
