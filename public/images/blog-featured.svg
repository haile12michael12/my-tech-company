<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="blogFeature" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E293B"/>
  
  <!-- Abstract Wave Pattern -->
  <path d="M0 200 Q300 150 600 200 T1200 200 L1200 630 L0 630 Z" fill="url(#blogFeature)" opacity="0.1"/>
  
  <!-- Central Article Icon -->
  <g transform="translate(600, 315)">
    <circle r="150" fill="url(#blogFeature)" opacity="0.15"/>
    <rect x="-100" y="-80" width="200" height="160" rx="12" fill="#0F172A" stroke="url(#blogFeature)" stroke-width="3"/>
    
    <!-- Text Lines -->
    <rect x="-70" y="-40" width="140" height="8" rx="4" fill="url(#blogFeature)" opacity="0.6"/>
    <rect x="-70" y="-20" width="120" height="6" rx="3" fill="url(#blogFeature)" opacity="0.4"/>
    <rect x="-70" y="-5" width="130" height="6" rx="3" fill="url(#blogFeature)" opacity="0.4"/>
    <rect x="-70" y="10" width="100" height="6" rx="3" fill="url(#blogFeature)" opacity="0.4"/>
    
    <!-- Author Section -->
    <circle cx="-55" cy="40" r="15" fill="url(#blogFeature)" opacity="0.3"/>
    <rect x="-30" cy="35" width="80" height="6" rx="3" fill="url(#blogFeature)" opacity="0.5"/>
    <rect x="-30" cy="48" width="60" height="5" rx="2.5" fill="url(#blogFeature)" opacity="0.3"/>
  </g>
  
  <!-- Floating Elements -->
  <circle cx="150" cy="100" r="30" fill="url(#blogFeature)" opacity="0.2"/>
  <circle cx="1050" cy="100" r="40" fill="url(#blogFeature)" opacity="0.2"/>
  <circle cx="150" cy="530" r="35" fill="url(#blogFeature)" opacity="0.2"/>
  <circle cx="1050" cy="530" r="30" fill="url(#blogFeature)" opacity="0.2"/>
  
  <!-- Connection Dots -->
  <g fill="url(#blogFeature)" opacity="0.6">
    <circle cx="200" cy="150" r="5"/>
    <circle cx="1000" cy="150" r="5"/>
    <circle cx="200" cy="480" r="5"/>
    <circle cx="1000" cy="480" r="5"/>
  </g>
</svg>
