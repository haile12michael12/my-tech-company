<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="serviceThumb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#F8FAFC" rx="12"/>
  
  <!-- Code Editor Window -->
  <g transform="translate(50, 40)">
    <rect width="300" height="220" rx="8" fill="#1E293B"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="20" r="6" fill="#EF4444"/>
    <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
    <circle cx="60" cy="20" r="6" fill="#10B981"/>
    
    <!-- Code Lines -->
    <g font-family="monospace" font-size="8" fill="#3B82F6">
      <text x="20" y="50">&lt;div class="app"&gt;</text>
      <text x="30" y="65">&lt;Header /&gt;</text>
      <text x="30" y="80">&lt;Main&gt;</text>
      <text x="40" y="95">{content}</text>
      <text x="30" y="110">&lt;/Main&gt;</text>
      <text x="30" y="125">&lt;Footer /&gt;</text>
      <text x="20" y="140">&lt;/div&gt;</text>
    </g>
    
    <!-- Sidebar -->
    <rect x="220" y="40" width="2" height="180" fill="#3B82F6" opacity="0.3"/>
    <rect x="240" y="50" width="40" height="6" rx="3" fill="#8B5CF6" opacity="0.5"/>
    <rect x="240" y="65" width="35" height="6" rx="3" fill="#8B5CF6" opacity="0.4"/>
    <rect x="240" y="80" width="45" height="6" rx="3" fill="#8B5CF6" opacity="0.5"/>
  </g>
</svg>
