<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="portfolioFeature" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  
  <!-- Grid Pattern -->
  <g stroke="#3B82F6" stroke-width="1" opacity="0.15">
    <path d="M0 0 V630 M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630 M1200 0 V630"/>
    <path d="M0 0 H1200 M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 630 H1200"/>
  </g>
  
  <!-- Central Project Display -->
  <g transform="translate(600, 315)">
    <!-- Outer Glow -->
    <circle r="180" fill="url(#portfolioFeature)" opacity="0.1"/>
    
    <!-- Laptop Frame -->
    <rect x="-140" y="-60" width="280" height="160" rx="12" fill="#1E293B" stroke="url(#portfolioFeature)" stroke-width="3"/>
    <rect x="-125" y="-45" width="250" height="130" rx="6" fill="#0F172A"/>
    
    <!-- Screen Content - Abstract UI -->
    <rect x="-105" y="-25" width="210" height="30" rx="4" fill="url(#portfolioFeature)" opacity="0.3"/>
    <rect x="-105" y="15" width="100" height="80" rx="6" fill="url(#portfolioFeature)" opacity="0.2"/>
    <rect x="5" y="15" width="100" height="80" rx="6" fill="url(#portfolioFeature)" opacity="0.25"/>
    
    <!-- Keyboard Base -->
    <path d="M-160 110 L160 110 L180 130 L-180 130 Z" fill="#1E293B" stroke="url(#portfolioFeature)" stroke-width="2"/>
  </g>
  
  <!-- Corner Decorations -->
  <g transform="translate(100, 100)">
    <circle r="40" fill="none" stroke="url(#portfolioFeature)" stroke-width="2"/>
    <circle r="25" fill="url(#portfolioFeature)" opacity="0.2"/>
  </g>
  
  <g transform="translate(1100, 100)">
    <circle r="50" fill="none" stroke="url(#portfolioFeature)" stroke-width="2"/>
    <circle r="30" fill="url(#portfolioFeature)" opacity="0.2"/>
  </g>
  
  <g transform="translate(100, 530)">
    <circle r="45" fill="none" stroke="url(#portfolioFeature)" stroke-width="2"/>
    <circle r="28" fill="url(#portfolioFeature)" opacity="0.2"/>
  </g>
  
  <g transform="translate(1100, 530)">
    <circle r="40" fill="none" stroke="url(#portfolioFeature)" stroke-width="2"/>
    <circle r="25" fill="url(#portfolioFeature)" opacity="0.2"/>
  </g>
  
  <!-- Connection Lines -->
  <line x1="140" y1="140" x2="460" y2="315" stroke="url(#portfolioFeature)" stroke-width="2" opacity="0.3"/>
  <line x1="1060" y1="140" x2="740" y2="315" stroke="url(#portfolioFeature)" stroke-width="2" opacity="0.3"/>
  <line x1="140" y1="490" x2="460" y2="315" stroke="url(#portfolioFeature)" stroke-width="2" opacity="0.3"/>
  <line x1="1060" y1="490" x2="740" y2="315" stroke="url(#portfolioFeature)" stroke-width="2" opacity="0.3"/>
</svg>
