<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="portfolioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0F172A"/>
  
  <!-- Grid Pattern -->
  <g stroke="#3B82F6" stroke-width="0.5" opacity="0.1">
    <path d="M0 0 V800 M100 0 V800 M200 0 V800 M300 0 V800 M400 0 V800 M500 0 V800 M600 0 V800 M700 0 V800 M800 0 V800 M900 0 V800 M1000 0 V800 M1100 0 V800 M1200 0 V800"/>
    <path d="M0 0 H1200 M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200 M0 800 H1200"/>
  </g>
  
  <!-- Project Showcase 1: Dashboard -->
  <g transform="translate(100, 100)">
    <rect width="450" height="280" rx="12" fill="url(#portfolioGrad)" opacity="0.15"/>
    <rect x="20" y="20" width="410" height="240" rx="8" fill="#1E293B"/>
    <!-- Dashboard UI -->
    <rect x="40" y="40" width="370" height="60" rx="6" fill="#3B82F6" opacity="0.2"/>
    <rect x="40" y="120" width="170" height="140" rx="6" fill="#8B5CF6" opacity="0.2"/>
    <rect x="240" y="120" width="170" height="140" rx="6" fill="#3B82F6" opacity="0.2"/>
    <circle cx="125" cy="190" r="30" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <path d="M280 160 L370 160 M280 190 L350 190 M280 220 L360 220" stroke="#8B5CF6" stroke-width="2"/>
  </g>
  
  <!-- Project Showcase 2: Mobile App -->
  <g transform="translate(650, 100)">
    <rect width="450" height="280" rx="12" fill="url(#portfolioGrad)" opacity="0.15"/>
    <rect x="20" y="20" width="410" height="240" rx="8" fill="#1E293B"/>
    <!-- Mobile Frame -->
    <rect x="155" y="40" width="140" height="200" rx="16" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
    <rect x="165" y="50" width="120" height="180" rx="10" fill="#1E293B"/>
    <circle cx="225" cy="80" r="20" fill="#3B82F6" opacity="0.3"/>
    <rect x="175" y="110" width="100" height="8" rx="4" fill="#8B5CF6" opacity="0.4"/>
    <rect x="175" y="130" width="80" height="6" rx="3" fill="#3B82F6" opacity="0.3"/>
    <rect x="175" y="150" width="90" height="6" rx="3" fill="#8B5CF6" opacity="0.3"/>
  </g>
  
  <!-- Project Showcase 3: Analytics -->
  <g transform="translate(100, 420)">
    <rect width="450" height="280" rx="12" fill="url(#portfolioGrad)" opacity="0.15"/>
    <rect x="20" y="20" width="410" height="240" rx="8" fill="#1E293B"/>
    <!-- Chart -->
    <rect x="40" y="60" width="330" height="160" fill="#0F172A"/>
    <path d="M60 200 L120 160 L180 180 L240 120 L300 140 L360 80" fill="none" stroke="#3B82F6" stroke-width="3"/>
    <circle cx="120" cy="160" r="5" fill="#8B5CF6"/>
    <circle cx="240" cy="120" r="5" fill="#3B82F6"/>
    <circle cx="360" cy="80" r="5" fill="#8B5CF6"/>
  </g>
  
  <!-- Project Showcase 4: E-commerce -->
  <g transform="translate(650, 420)">
    <rect width="450" height="280" rx="12" fill="url(#portfolioGrad)" opacity="0.15"/>
    <rect x="20" y="20" width="410" height="240" rx="8" fill="#1E293B"/>
    <!-- Product Grid -->
    <rect x="40" y="60" width="110" height="140" rx="6" fill="#3B82F6" opacity="0.2"/>
    <rect x="170" y="60" width="110" height="140" rx="6" fill="#8B5CF6" opacity="0.2"/>
    <rect x="300" y="60" width="110" height="140" rx="6" fill="#3B82F6" opacity="0.2"/>
    <circle cx="95" cy="110" r="20" fill="#3B82F6" opacity="0.3"/>
    <circle cx="225" cy="110" r="20" fill="#8B5CF6" opacity="0.3"/>
    <circle cx="355" cy="110" r="20" fill="#3B82F6" opacity="0.3"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="1100" cy="100" r="40" fill="url(#portfolioGrad)" opacity="0.2"/>
  <circle cx="100" cy="700" r="30" fill="url(#portfolioGrad)" opacity="0.15"/>
  <circle cx="1150" cy="750" r="50" fill="url(#portfolioGrad)" opacity="0.1"/>
</svg>
