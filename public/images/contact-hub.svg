<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0F172A"/>
  
  <!-- Grid Pattern -->
  <g stroke="#3B82F6" stroke-width="1" opacity="0.1">
    <path d="M0 0 V600 M50 0 V600 M100 0 V100 M150 0 V600 M200 0 V600 M250 0 V600 M300 0 V600 M350 0 V600 M400 0 V600 M450 0 V600 M500 0 V600 M550 0 V600 M600 0 V600 M650 0 V600 M700 0 V600 M750 0 V600 M800 0 V600"/>
    <path d="M0 0 H800 M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800 M0 450 H800 M0 500 H800 M0 550 H800 M0 600 H800"/>
  </g>
  
  <!-- Central Communication Hub -->
  <circle cx="400" cy="300" r="120" fill="url(#contactGrad)" opacity="0.15"/>
  <circle cx="400" cy="300" r="80" fill="none" stroke="url(#contactGrad)" stroke-width="2"/>
  
  <!-- Communication Icons -->
  <g transform="translate(400, 300)">
    <!-- Email Icon -->
    <g transform="translate(-150, -120)">
      <rect x="-30" y="-20" width="60" height="40" rx="6" fill="url(#contactGrad)" opacity="0.2"/>
      <path d="M-30 -20 L0 5 L30 -20" fill="none" stroke="url(#contactGrad)" stroke-width="2"/>
    </g>
    
    <!-- Phone Icon -->
    <g transform="translate(150, -120)">
      <path d="M-20 -30 Q-10 -40 0 -30 L20 -10 Q30 0 20 10 L10 20 Q0 30 -10 20 L-30 0 Q-40 -10 -30 -20 Z" fill="url(#contactGrad)" opacity="0.2"/>
    </g>
    
    <!-- Location Icon -->
    <g transform="translate(-150, 120)">
      <path d="M0 -30 Q15 -30 15 -15 Q15 0 0 15 Q-15 0 -15 -15 Q-15 -30 0 -30" fill="url(#contactGrad)" opacity="0.2"/>
      <circle r="8" fill="none" stroke="url(#contactGrad)" stroke-width="2"/>
    </g>
    
    <!-- Chat Icon -->
    <g transform="translate(150, 120)">
      <rect x="-30" y="-25" width="60" height="50" rx="8" fill="url(#contactGrad)" opacity="0.2"/>
      <path d="M-10 25 L0 35 L10 25" fill="none" stroke="url(#contactGrad)" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Connection Lines to Center -->
  <line x1="250" y1="180" x2="400" y2="300" stroke="url(#contactGrad)" stroke-width="2" opacity="0.4"/>
  <line x1="550" y1="180" x2="400" y2="300" stroke="url(#contactGrad)" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="420" x2="400" y2="300" stroke="url(#contactGrad)" stroke-width="2" opacity="0.4"/>
  <line x1="550" y1="420" x2="400" y2="300" stroke="url(#contactGrad)" stroke-width="2" opacity="0.4"/>
  
  <!-- Signal Waves -->
  <g stroke="url(#contactGrad)" stroke-width="2" fill="none" opacity="0.3">
    <ellipse cx="400" cy="300" rx="180" ry="180"/>
    <ellipse cx="400" cy="300" rx="240" ry="240"/>
  </g>
  
  <!-- Corner Decorations -->
  <circle cx="50" cy="50" r="15" fill="url(#contactGrad)" opacity="0.3"/>
  <circle cx="750" cy="50" r="15" fill="url(#contactGrad)" opacity="0.3"/>
  <circle cx="50" cy="550" r="15" fill="url(#contactGrad)" opacity="0.3"/>
  <circle cx="750" cy="550" r="15" fill="url(#contactGrad)" opacity="0.3"/>
</svg>
