<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#F8FAFC"/>
  
  <!-- Abstract Wave Pattern -->
  <path d="M0 500 Q300 450 600 500 T1200 500 L1200 600 L0 600 Z" fill="url(#aboutGrad)" opacity="0.1"/>
  <path d="M0 480 Q300 430 600 480 T1200 480 L1200 600 L0 600 Z" fill="url(#aboutGrad)" opacity="0.15"/>
  
  <!-- Team Circle -->
  <circle cx="600" cy="280" r="180" fill="url(#aboutGrad)" opacity="0.1"/>
  <circle cx="600" cy="280" r="150" fill="none" stroke="url(#aboutGrad)" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Central Icon - People/Team -->
  <g transform="translate(600, 280)">
    <circle cx="0" cy="-40" r="30" fill="url(#aboutGrad)" opacity="0.3"/>
    <path d="M-50 80 Q0 20 50 80" fill="url(#aboutGrad)" opacity="0.3"/>
    <circle cx="-70" cy="-20" r="25" fill="url(#aboutGrad)" opacity="0.2"/>
    <path d="M-110 60 Q-70 20 -30 60" fill="url(#aboutGrad)" opacity="0.2"/>
    <circle cx="70" cy="-20" r="25" fill="url(#aboutGrad)" opacity="0.2"/>
    <path d="M110 60 Q70 20 30 60" fill="url(#aboutGrad)" opacity="0.2"/>
  </g>
  
  <!-- Connection Dots -->
  <circle cx="300" cy="150" r="8" fill="#3B82F6" opacity="0.6"/>
  <circle cx="900" cy="150" r="8" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="300" cy="450" r="8" fill="#059669" opacity="0.6"/>
  <circle cx="900" cy="450" r="8" fill="#3B82F6" opacity="0.6"/>
  
  <!-- Connecting Lines -->
  <line x1="300" y1="150" x2="600" y2="280" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <line x1="900" y1="150" x2="600" y2="280" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="450" x2="600" y2="280" stroke="#059669" stroke-width="2" opacity="0.3"/>
  <line x1="900" y1="450" x2="600" y2="280" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  
  <!-- Decorative Elements -->
  <rect x="100" y="80" width="60" height="60" rx="12" fill="url(#aboutGrad)" opacity="0.1" transform="rotate(15 130 110)"/>
  <rect x="1040" y="80" width="60" height="60" rx="12" fill="url(#aboutGrad)" opacity="0.1" transform="rotate(-15 1070 110)"/>
  <circle cx="100" cy="520" r="40" fill="url(#aboutGrad)" opacity="0.08"/>
  <circle cx="1100" cy="520" r="40" fill="url(#aboutGrad)" opacity="0.08"/>
</svg>
