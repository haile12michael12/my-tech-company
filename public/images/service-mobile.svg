<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="serviceThumb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#F8FAFC" rx="12"/>
  
  <!-- Mobile Devices -->
  <g transform="translate(100, 50)">
    <!-- Phone 1 -->
    <rect x="0" y="0" width="80" height="160" rx="12" fill="#0F172A" stroke="url(#serviceThumb2)" stroke-width="2"/>
    <rect x="8" y="8" width="64" height="144" rx="6" fill="#1E293B"/>
    <circle cx="40" cy="140" r="6" fill="none" stroke="url(#serviceThumb2)" stroke-width="2"/>
    
    <!-- Phone 2 (offset) -->
    <rect x="60" y="20" width="80" height="160" rx="12" fill="#0F172A" stroke="url(#serviceThumb2)" stroke-width="2"/>
    <rect x="68" y="28" width="64" height="144" rx="6" fill="#1E293B"/>
    <rect x="80" y="45" width="40" height="6" rx="3" fill="url(#serviceThumb2)" opacity="0.5"/>
    <rect x="80" y="60" width="35" height="6" rx="3" fill="url(#serviceThumb2)" opacity="0.4"/>
    <rect x="80" y="75" width="45" height="6" rx="3" fill="url(#serviceThumb2)" opacity="0.5"/>
    
    <!-- Phone 3 (offset) -->
    <rect x="120" y="40" width="80" height="160" rx="12" fill="#0F172A" stroke="url(#serviceThumb2)" stroke-width="2"/>
    <rect x="128" y="48" width="64" height="144" rx="6" fill="#1E293B"/>
    <circle cx="160" cy="100" r="25" fill="none" stroke="url(#serviceThumb2)" stroke-width="2"/>
  </g>
</svg>
