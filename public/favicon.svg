<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" stroke="url(#logoGradient)" stroke-width="2" fill="none"/>
  
  <!-- N Letter Abstract Design -->
  <path d="M60 140 L60 60 L80 60 L110 100 L110 60 L130 60 L130 140 L110 140 L80 100 L80 140 Z" 
        fill="url(#logoGradient)" 
        stroke="url(#logoGradient)" 
        stroke-width="2"
        stroke-linejoin="round"/>
  
  <!-- Tech Circuit Elements -->
  <circle cx="60" cy="60" r="4" fill="#3B82F6"/>
  <circle cx="130" cy="140" r="4" fill="#8B5CF6"/>
  <line x1="60" y1="60" x2="70" y2="60" stroke="#3B82F6" stroke-width="2"/>
  <line x1="120" y1="140" x2="130" y2="140" stroke="#8B5CF6" stroke-width="2"/>
</svg>
